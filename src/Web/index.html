<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
            pointer-events: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: transparent !important;
        }

        canvas {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <canvas id="sparkCanvas"></canvas>
    <script>
        // 原来是多文件编辑的
        // 现在整合成了一个文件
        // 所以可能更加石山（）
        class MouseSpark {
            constructor(opts = {}) {
                this.color = opts.color || '45,175,255';
                this.scale = opts.scale || 1.5;
                this.opacity = opts.opacity || 1.0;
                this.trailSpeed = opts.trailSpeed != null ? opts.trailSpeed : (opts.speed || 1.0);
                this.clickSpeed = opts.clickSpeed != null ? opts.clickSpeed : (opts.speed || 1.0);
                this.maxTrail = opts.maxTrail || 16;

                this.sparksPool = [];
                this.wavesPool = [];

                this.waves = [];
                this.sparks = [];
                this.trail = [];
                this.isDown = false;
                this.lastPos = null;
                this.baseFrameMs = 1000 / 60;
                this.maxDeltaMs = 100;
                this.lastFrameTime = performance.now();


                this.ringsStartColor = [250, 252, 252];
                //this.ringsEndColor = [200, 250, 255];
                this.ringsEndColor = this.color.split(',').map(Number).map(n => (n + 255 * 2) / 3);

                this.initCanvas();
                this.bindEvents();
                requestAnimationFrame((now) => this.animationLoops(now));
            }

            bindEvents() {
                const getPos = (e) => ({ x: e.clientX, y: e.clientY });
                const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

                window.addEventListener("mousedown", e => {
                    this.isDown = true;
                    this.lastPos = getPos(e);
                    this.createEffects(this.lastPos.x, this.lastPos.y);
                });

                window.addEventListener("mousemove", e => {
                    if (!this.isDown && !window.effectiveAlwaysTrail) return;
                    const p = getPos(e);
                    if (!this.lastPos) this.lastPos = p;

                    if (this.lastPos && dist(p, this.lastPos) > 2) {
                        this.trail.push({ x: p.x, y: p.y, life: 1 });
                        this.lastPos = p;
                        if (this.trail.length > this.maxTrail) this.trail.shift();

                        if (Math.random() < 0.3) {
                            let a = Math.random() * Math.PI * 2;
                            let speedAdjust = this.scale / 1.5;
                            this.sparks.push({
                                x: p.x + Math.cos(a) * 10 * this.scale,
                                y: p.y + Math.sin(a) * 10 * this.scale,
                                vx: Math.cos(a) * 1.3 * speedAdjust,
                                vy: Math.sin(a) * 1.3 * speedAdjust,
                                rot: Math.random() * Math.PI * 2,
                                rs: 0.16,
                                s: 9 * this.scale,
                                a: 0.7,
                                f: 0.95,
                                fromClick: false
                            });
                        }
                    }
                });

                window.addEventListener("mouseup", () => this.isDown = false);
            }

            // 初始化画布
            initCanvas() {
                // 主画布
                this.mainCanvas = document.getElementById("sparkCanvas");
                this.mainCtx = this.mainCanvas.getContext("2d");

                // 缓冲画布
                this.bufferCanvas = document.createElement("canvas");
                this.bufferCtx = this.bufferCanvas.getContext("2d");

                //
                this.resize();

                // 监听窗口缩放
                window.addEventListener("resize", () => this.resize());
            }

            alpha(value) {
                return Math.max(0, Math.min(1, value * this.opacity));
            }

            resize() {
                let dpr = window.devicePixelRatio || 1;

                // 主画布尺寸
                this.mainCanvas.width = window.innerWidth * dpr;
                this.mainCanvas.height = window.innerHeight * dpr;

                // 缓冲画布尺寸
                this.bufferCanvas.width = this.mainCanvas.width;
                this.bufferCanvas.height = this.mainCanvas.height;

                this.bufferCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            // 中间的填充叫 filledCircle
            // 外围的弧线叫 ring
            // 它们合起来叫 wave


            // -=创建点击效果=-
            createEffects = function (x, y) {
                const ringsConfig = {
                    rsList: [0, 0.03, 0.06],    // 圆弧整体旋转速度
                    rRoundRateList: [0, 1, 1.5, 2],   // 圆弧半径增加比例
                    len: 1.1 * Math.PI     // 圆弧长度
                };
                const sparksConfig = {
                    sparksCount: 4    // 点击产生的粒子数
                };
                // 创建波
                function createWave(x, y) {
                    // 创建
                    let wave;
                    if (this.wavesPool.length > 0) {
                        wave = this.wavesPool.pop();
                    } else {
                        wave = {};
                    }
                    if (!wave.ring) wave.ring = { segs: [] };

                    // 赋值
                    wave.x = x;
                    wave.y = y;
                    wave.r = 0;
                    wave.life = 0;
                    wave.ring.ang = Math.random() * Math.PI * 2;
                    wave.ring.rs = ringsConfig.rsList[Math.floor(Math.random() * ringsConfig.rsList.length)];
                    wave.ring.segs[0] = {
                        off: 0,
                        len: ringsConfig.len,
                        rRoundRate: ringsConfig.rRoundRateList[Math.floor(Math.random() * ringsConfig.rRoundRateList.length)]
                    };
                    wave.ring.segs[1] = {
                        off: (Math.random() * 3 - 1.5) * Math.PI,
                        len: ringsConfig.len,
                        rRoundRate: ringsConfig.rRoundRateList[Math.floor(Math.random() * ringsConfig.rRoundRateList.length)]
                    };

                    // 进入循环
                    this.waves.push(wave);
                }
                // 创建粒子
                function createSpark(x, y) {
                    let speedAdjust = this.scale / 1.5;
                    for (let i = 0; i < sparksConfig.sparksCount; i++) {
                        let a = Math.random() * Math.PI * 2;
                        let speed = (4.8 + Math.random() * 2) * speedAdjust;

                        // 创建
                        let spark;
                        if (this.sparksPool.length > 0) {
                            spark = this.sparksPool.pop();
                        } else {
                            spark = {};
                        }

                        // 赋值
                        spark.x = x;
                        spark.y = y;
                        spark.vx = Math.cos(a) * speed;
                        spark.vy = Math.sin(a) * speed;
                        spark.rot = Math.random() * Math.PI * 2;
                        spark.rs = (Math.random() - 0.5) * 0.28;
                        spark.s = (4 + Math.random() * 3) * this.scale;
                        spark.a = 1;
                        spark.f = 0.9;

                        // 进入循环
                        this.sparks.push(spark);
                    }
                }

                createWave.call(this, x, y);
                createSpark.call(this, x, y);
            };

            // -=执行动画循环=-
            animationLoops(now) {
                const ringsConfig = {
                    // ==Start-整合的数据==
                    rsList: [0, 0.08, 0.1],    // 圆弧整体旋转速度
                    rRoundRateList: [0, 1, 1.5, 2],   // 圆弧半径增加比例
                    len: 1.1 * Math.PI,         // 圆弧长度
                    // ==End-整合的数据==

                    maxLife: 23,
                    segNum: 16,                 // 拆成的段数
                    minW: 0.4,                  // 最小宽度
                    maxW: 3.3,                    // 最大宽度
                    lenStopAddPoint: 0.1,       // 停止延长的时间比例 
                    lenStartDimPoint: 0.4,      // 开始缩短的时间比例
                };
                const filledCirclesConfig = {
                    rAddRate: 26,                  // 半径增加比例
                    maxLife: 16
                };

                function clearBufferCanvas() {
                    this.bufferCtx.clearRect(0, 0, this.mainCanvas.width, this.mainCanvas.height);
                }
                function updateTrail(frameScale) {

                    for (let i = this.trail.length - 1; i >= 0; i--) {
                        let t = this.trail[i];
                        if (window.effectiveAlwaysTrail) {
                            t.life -= 0.085 * frameScale;
                        } else {
                            t.life -= (this.isDown ? 0.085 : 0.18) * frameScale;
                        }
                        if (t.life <= 0) this.trail.splice(i, 1);
                    }

                    if (this.trail.length > 1) {
                        // 逐段渲染：每段的透明度基于数组索引位置，而非空间位置
                        // 防止当鼠标锐角转动时，尾迹变淡后突然出现的问题
                        this.bufferCtx.lineWidth = 5.0;
                        this.bufferCtx.shadowColor = `rgba(${this.color}, 0.6)`;
                        this.bufferCtx.shadowBlur = 3;
                        this.bufferCtx.shadowOffsetX = 0;
                        this.bufferCtx.shadowOffsetY = 0;

                        const lastIdx = this.trail.length - 1;
                        for (let i = 0; i < lastIdx; i++) {
                            const alphaStart = i / lastIdx;
                            const alphaEnd = (i + 1) / lastIdx;
                            const a0 = this.trail[i];
                            const a1 = this.trail[i + 1];

                            // 每段使用独立的两点渐变，只覆盖该段自身
                            const segGrad = this.bufferCtx.createLinearGradient(
                                a0.x, a0.y, a1.x, a1.y
                            );
                            segGrad.addColorStop(0, `rgba(${this.color}, ${alphaStart})`);
                            segGrad.addColorStop(1, `rgba(${this.color}, ${alphaEnd})`);

                            this.bufferCtx.beginPath();
                            this.bufferCtx.moveTo(a0.x, a0.y);
                            this.bufferCtx.lineTo(a1.x, a1.y);
                            this.bufferCtx.strokeStyle = segGrad;
                            this.bufferCtx.stroke();
                        }

                        this.bufferCtx.shadowColor = 'transparent';

                    }
                }
                function updateWaves(frameScale) {
                    function updateFilledCircle(frameScale, w, rProg) {
                        w.life += frameScale;
                        let ease = 1 - Math.pow(1 - rProg, 3);
                        w.r = filledCirclesConfig.rAddRate * this.scale * ease;
                        let alpha = Math.max(0, 1 - rProg);
                        if (alpha > 0) {
                            this.bufferCtx.beginPath();
                            this.bufferCtx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
                            this.bufferCtx.fillStyle = `rgba(${this.color},${this.alpha(alpha)})`;
                            // 优化：减少阴影效果
                            this.bufferCtx.fill();
                        }
                    }
                    function updateRings(frameScale, w, rProg) {
                        function getWeightProp(t) {
                            return Math.min(2 - Math.abs(4 * (t - 0.5)), 1);
                        }
                        function getColor(rProg) {
                            const t = Math.min(1.2 * rProg, 1);
                            const r = this.ringsStartColor[0] * (1 - t) + this.ringsEndColor[0] * t;
                            const g = this.ringsStartColor[1] * (1 - t) + this.ringsEndColor[1] * t;
                            const b = this.ringsStartColor[2] * (1 - t) + this.ringsEndColor[2] * t;
                            return `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}`;
                        }
                        function getAlpha(rProg) {
                            return Math.min(1.1 - 0.3 * rProg, 1);
                        }
                        /* 声明段 */
                        // 圆弧参数
                        let start = 0, end = 0;     // 喵~
                        let len = 0;                // 喵~
                        let shrink = 0;             // 收缩系数
                        let r = w.ring;
                        let seg = null;             // 当前所要操控的seg

                        let base = 0;       // 基准点

                        // 段圆弧参数
                        let t0 = 0;        // 段圆弧起始点比值
                        let t1 = 0;        // 段圆弧结束点比值
                        let a0 = 0;        // 启动子位置  （？
                        let a1 = 0;        // 终止子位置  （？


                        /* 计算段 */
                        r.life += frameScale;                           // 
                        r.ang -= r.rs * frameScale;                     // 圆环旋转

                        for (let i = 0; i < 2; ++i) {
                            seg = r.segs[i];

                            base = r.ang + seg.off;

                            if (rProg <= ringsConfig.lenStopAddPoint) {
                                // 前段：终点固定，起点逆时针延伸
                                len = seg.len * (rProg / ringsConfig.lenStopAddPoint);
                                end = base + seg.len;
                                start = end - len;
                            }
                            else if (rProg > ringsConfig.lenStartDimPoint) {
                                // 后段：起点固定，终点逆时针收回
                                len = seg.len * (1 - (rProg - ringsConfig.lenStartDimPoint) / (1 - ringsConfig.lenStartDimPoint));
                                start = base;
                                end = start + len;
                            }
                            else {
                                // 中段：完整圆弧
                                len = seg.len;
                                start = base;
                                end = start + len;
                            }


                            for (let k = 0; k < ringsConfig.segNum; k++) {
                                t0 = k / ringsConfig.segNum;                        // 段圆弧起始点比值
                                t1 = (k + 1) / ringsConfig.segNum;                  // 段圆弧结束点比值
                                a0 = start + (end - start) * t0;        // 启动子位置  （？
                                a1 = start + (end - start) * t1;        // 终止子位置  （？

                                if (Math.abs(a1 - a0) < 0.01) continue;

                                // 光弧
                                let wT = getWeightProp(t0);
                                this.bufferCtx.beginPath();
                                this.bufferCtx.arc(w.x, w.y, w.r + seg.rRoundRate * this.scale, a0, a1);
                                this.bufferCtx.lineWidth = (ringsConfig.minW * (1 - wT) + ringsConfig.maxW * wT) * Math.min((-0.8 * (rProg - 0.8) + 1), 1); // 看不懂了（？）
                                this.bufferCtx.strokeStyle = `${getColor.call(this, rProg)}, ${getAlpha(rProg)})`;
                                this.bufferCtx.stroke();
                            }
                        }
                    }

                    for (let i = this.waves.length - 1; i >= 0; i--) {
                        let w = this.waves[i];
                        let waveProg = Math.min(w.life / filledCirclesConfig.maxLife, 1);    // 动画进度 0->1
                        let ringProg = Math.min(w.life / ringsConfig.maxLife, 1);    // 动画进度 0->1

                        updateFilledCircle.call(this, frameScale, w, waveProg);
                        updateRings.call(this, frameScale, w, ringProg);

                        // 回收对象到对象池
                        if (ringProg >= 1 && waveProg >= 1) {
                            this.wavesPool.push(this.waves[i]);
                            this.waves.splice(i, 1);
                        }
                    }
                }
                function updateSparks(clickFrameScale, trailFrameScale) {
                    for (let i = this.sparks.length - 1; i >= 0; i--) {
                        let s = this.sparks[i];
                        const fs = s.fromClick ? clickFrameScale : trailFrameScale;
                        s.x += s.vx * fs;
                        s.y += s.vy * fs;
                        s.vx *= Math.pow(s.f, fs);
                        s.vy *= Math.pow(s.f, fs);
                        s.rot += s.rs * fs;
                        s.a -= 0.032 * fs;
                        if (s.a <= 0) {
                            this.sparksPool.push(this.sparks[i]);
                            this.sparks.splice(i, 1);
                            continue;
                        }

                        this.bufferCtx.save();
                        this.bufferCtx.translate(s.x, s.y);
                        this.bufferCtx.rotate(s.rot);
                        this.bufferCtx.beginPath();
                        this.bufferCtx.moveTo(0, -s.s);
                        this.bufferCtx.lineTo(s.s * 0.6, s.s * 0.6);
                        this.bufferCtx.lineTo(-s.s * 0.6, s.s * 0.6);
                        this.bufferCtx.fillStyle = `rgba(255,255,255,${this.alpha(s.a)})`;
                        this.bufferCtx.fill();
                        this.bufferCtx.restore();
                    }
                }
                function renderCanvas() {
                    this.mainCtx.clearRect(0, 0, this.mainCanvas.width, this.mainCanvas.height);
                    this.mainCtx.drawImage(this.bufferCanvas, 0, 0);
                }

                // 计算帧时比，稳定动画速率
                const deltaMs = Math.min(now - this.lastFrameTime, this.maxDeltaMs);
                this.lastFrameTime = now;
                const baseScale = deltaMs / this.baseFrameMs;
                const trailFrameScale = baseScale * this.trailSpeed;
                const clickFrameScale = baseScale * this.clickSpeed;

                // 设置合成操作模式
                this.bufferCtx.globalCompositeOperation = "lighter";

                clearBufferCanvas.call(this);
                if (this.waves.length > 0 || this.sparks.length > 0 || this.trail.length > 0) {
                    updateTrail.call(this, trailFrameScale);
                    updateWaves.call(this, clickFrameScale);
                    updateSparks.call(this, clickFrameScale, trailFrameScale);
                }

                // 恢复合成操作模式
                this.bufferCtx.globalCompositeOperation = "source-over";

                // 渲染画布
                renderCanvas.call(this);

                //
                requestAnimationFrame((nextNow) => this.animationLoops(nextNow));
            };
        }

        window.spark = new MouseSpark();

        // C# 通信接口

        let lastBoomX = -1, lastBoomY = -1;
        let lastBoomTime = 0;
        let lastMoveX = -1, lastMoveY = -1;

        window.currentInputMode = "mouse";
        window.enableAlwaysTrailEffect = false;
        window.effectiveAlwaysTrail = false;

        window.setInputContext = (mode, alwaysTrailEnabled) => {
            window.currentInputMode = mode === "touch" ? "touch" : "mouse";
            window.enableAlwaysTrailEffect = Boolean(alwaysTrailEnabled);
            window.effectiveAlwaysTrail = window.currentInputMode === "mouse" && window.enableAlwaysTrailEffect;
        };

        window.setInputContext("mouse", false);

        // 接收 C# 传来的物理百分比 (0.0 ~ 1.0)，由前端根据真实的画布宽度自行计算
        window.externalBoom = (percentX, percentY) => {
            const now = Date.now();
            if (percentX === lastBoomX && percentY === lastBoomY && (now - lastBoomTime) < 25) return;
            lastBoomX = percentX; lastBoomY = percentY; lastBoomTime = now;

            // 百分比乘以 WebView 当前真实的内部宽度
            let cx = percentX * window.innerWidth;
            let cy = percentY * window.innerHeight;
            window.dispatchEvent(new MouseEvent('mousedown', { clientX: cx, clientY: cy, bubbles: true }));
        };

        window.externalMove = (percentX, percentY) => {
            if (percentX === lastMoveX && percentY === lastMoveY) return;
            lastMoveX = percentX; lastMoveY = percentY;

            // 方法与上述相同
            let cx = percentX * window.innerWidth;
            let cy = percentY * window.innerHeight;
            window.dispatchEvent(new MouseEvent('mousemove', { clientX: cx, clientY: cy, bubbles: true }));
        };
        window.externalUp = () => {
            window.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
        };

        window.updateColor = (rgbString) => {
            if (window.spark) {
                window.spark.color = rgbString;
                window.spark.ringsEndColor = rgbString.split(',').map(Number).map(n => (n + 255 * 2) / 3);
            }
        };

        window.updateEffectSettings = (scale, opacity, trailSpeed, clickSpeed) => {
            if (!window.spark) return;
            window.spark.scale = Math.max(0.5, Math.min(3, Number(scale) || 1.5));
            window.spark.opacity = Math.max(0.1, Math.min(1, Number(opacity) || 1.0));
            let t = Number(trailSpeed);
            if (!Number.isFinite(t)) t = 1.0;
            let c = Number(clickSpeed);
            if (!Number.isFinite(c)) c = t;
            window.spark.trailSpeed = Math.max(0.2, Math.min(3, t));
            window.spark.clickSpeed = Math.max(0.2, Math.min(3, c));
        };
    </script>
</body>

</html>
